name: ci

on:
  push:
    branches: [main]
  pull_request:

defaults:
  run:
    shell: pwsh

jobs:
  test:
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --no-audit --no-fund
      - run: npm run build:mcp
      - run: git diff --exit-code -- dist/mcp-server.cjs
      - run: npm run validate-manifest
      - run: npm test
